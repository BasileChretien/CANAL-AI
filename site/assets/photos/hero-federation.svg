<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 650"
     role="img" aria-labelledby="hero-fed-title hero-fed-desc"
     preserveAspectRatio="xMidYMid meet">
  <title id="hero-fed-title">CANAL-AI federation</title>
  <desc id="hero-fed-desc">Two hospital cards — CHU de Caen Normandie in France and Nagoya University Hospital in Japan — each enclosing a sealed data warehouse where patient records remain on site, linked by a single encrypted exchange of model parameters.</desc>

  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fdfaf3"/>
      <stop offset="100%" stop-color="#f3ebd9"/>
    </linearGradient>
    <linearGradient id="caenTint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#eef4fb"/>
      <stop offset="100%" stop-color="#dde8f5"/>
    </linearGradient>
    <linearGradient id="nagTint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbe9ec"/>
      <stop offset="100%" stop-color="#f5d6dc"/>
    </linearGradient>
    <style><![CDATA[
      .flow { animation: canalFlow 6s linear infinite; }
      @keyframes canalFlow { to { stroke-dashoffset: -56; } }
      @media (prefers-reduced-motion: reduce) {
        .flow { animation: none; }
      }
    ]]></style>
  </defs>

  <!-- Cream paper panel -->
  <rect x="0" y="0" width="520" height="650" rx="18" fill="url(#paper)"/>
  <rect x="0.75" y="0.75" width="518.5" height="648.5" rx="17.25"
        fill="none" stroke="#0b3d77" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Kicker -->
  <text x="260" y="36" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="700" letter-spacing="3" fill="#0b3d77" opacity="0.6">FRANCO-JAPANESE FEDERATED PILOT</text>

  <!-- ====================== CAEN CARD ====================== -->
  <g transform="translate(40 60)">
    <rect width="440" height="200" rx="14"
          fill="url(#caenTint)"
          stroke="#0055A4" stroke-opacity="0.4" stroke-width="1.5"/>

    <!-- Hospital glyph -->
    <g transform="translate(22 24)">
      <rect width="38" height="38" rx="9" fill="#0055A4"/>
      <path d="M16 8h6v9h9v6h-9v9h-6v-9h-9v-6h9z" fill="#fff"/>
    </g>

    <!-- Title -->
    <text x="74" y="40" font-family="Inter, system-ui, sans-serif"
          font-size="17" font-weight="700" fill="#0b3d77">CHU de Caen Normandie</text>
    <text x="74" y="60" font-family="Inter, system-ui, sans-serif"
          font-size="13" font-weight="500" fill="#0b3d77" opacity="0.75">Caen · France</text>

    <!-- Inner sealed data container -->
    <g transform="translate(22 84)">
      <rect width="396" height="100" rx="10"
            fill="#ffffff" fill-opacity="0.6"
            stroke="#0055A4" stroke-opacity="0.4" stroke-width="1.5"
            stroke-dasharray="5 4"/>

      <!-- Database cylinder -->
      <g transform="translate(18 22)" stroke="#0055A4" stroke-width="1.6"
         fill="#0055A4" fill-opacity="0.14">
        <path d="M0 6 V50 A20 6 0 0 0 40 50 V6"/>
        <ellipse cx="20" cy="6" rx="20" ry="6"/>
        <path d="M0 22 A20 6 0 0 0 40 22" fill="none"/>
        <path d="M0 38 A20 6 0 0 0 40 38" fill="none"/>
      </g>

      <!-- Caption -->
      <text x="76" y="38" font-family="Inter, system-ui, sans-serif"
            font-size="14" font-weight="600" fill="#0b3d77">Patient data stays on site</text>
      <text x="76" y="58" font-family="Inter, system-ui, sans-serif"
            font-size="12" fill="#0b3d77" opacity="0.75">OMOP-CDM clinical data warehouse</text>

      <!-- Pill -->
      <g transform="translate(76 70)">
        <rect width="106" height="20" rx="10" fill="#0055A4" fill-opacity="0.14"/>
        <text x="53" y="14" text-anchor="middle"
              font-family="Inter, system-ui, sans-serif"
              font-size="11" font-weight="700" letter-spacing="0.6" fill="#0b3d77">NEVER LEAVES</text>
      </g>
    </g>
  </g>

  <!-- ====================== ENCRYPTED LINK ====================== -->
  <g transform="translate(260 268)">
    <!-- backing line -->
    <line x1="0" y1="0" x2="0" y2="118" stroke="#0b3d77"
          stroke-opacity="0.2" stroke-width="2.5"/>
    <!-- animated directional flow -->
    <line x1="0" y1="0" x2="0" y2="118" stroke="#0b3d77"
          stroke-opacity="0.9" stroke-width="2"
          stroke-dasharray="8 6" stroke-linecap="round" class="flow"/>

    <!-- Mid pill -->
    <g transform="translate(0 59)">
      <rect x="-140" y="-20" width="280" height="40" rx="20"
            fill="#ffffff"
            stroke="#0b3d77" stroke-opacity="0.45" stroke-width="1.5"/>
      <!-- lock icon -->
      <g transform="translate(-122 -10)">
        <rect x="0" y="7" width="14" height="12" rx="2" fill="#0b3d77"/>
        <path d="M3 7V4.5a4 4 0 0 1 8 0V7" fill="none"
              stroke="#0b3d77" stroke-width="1.6" stroke-linecap="round"/>
      </g>
      <text x="-95" y="5" font-family="Inter, system-ui, sans-serif"
            font-size="13" font-weight="600" fill="#0b3d77">Encrypted model parameters</text>
    </g>
  </g>

  <!-- ====================== NAGOYA CARD ====================== -->
  <g transform="translate(40 390)">
    <rect width="440" height="200" rx="14"
          fill="url(#nagTint)"
          stroke="#BC002D" stroke-opacity="0.4" stroke-width="1.5"/>

    <g transform="translate(22 24)">
      <rect width="38" height="38" rx="9" fill="#BC002D"/>
      <path d="M16 8h6v9h9v6h-9v9h-6v-9h-9v-6h9z" fill="#fff"/>
    </g>

    <text x="74" y="40" font-family="Inter, system-ui, sans-serif"
          font-size="17" font-weight="700" fill="#8a0020">Nagoya University Hospital</text>
    <text x="74" y="60" font-family="Inter, system-ui, sans-serif"
          font-size="13" font-weight="500" fill="#8a0020" opacity="0.78">Nagoya · Japan</text>

    <g transform="translate(22 84)">
      <rect width="396" height="100" rx="10"
            fill="#ffffff" fill-opacity="0.6"
            stroke="#BC002D" stroke-opacity="0.4" stroke-width="1.5"
            stroke-dasharray="5 4"/>

      <g transform="translate(18 22)" stroke="#BC002D" stroke-width="1.6"
         fill="#BC002D" fill-opacity="0.14">
        <path d="M0 6 V50 A20 6 0 0 0 40 50 V6"/>
        <ellipse cx="20" cy="6" rx="20" ry="6"/>
        <path d="M0 22 A20 6 0 0 0 40 22" fill="none"/>
        <path d="M0 38 A20 6 0 0 0 40 38" fill="none"/>
      </g>

      <text x="76" y="38" font-family="Inter, system-ui, sans-serif"
            font-size="14" font-weight="600" fill="#8a0020">Patient data stays on site</text>
      <text x="76" y="58" font-family="Inter, system-ui, sans-serif"
            font-size="12" fill="#8a0020" opacity="0.78">OMOP-CDM clinical data warehouse</text>

      <g transform="translate(76 70)">
        <rect width="106" height="20" rx="10" fill="#BC002D" fill-opacity="0.14"/>
        <text x="53" y="14" text-anchor="middle"
              font-family="Inter, system-ui, sans-serif"
              font-size="11" font-weight="700" letter-spacing="0.6" fill="#8a0020">NEVER LEAVES</text>
      </g>
    </g>
  </g>

  <!-- Status caption -->
  <text x="260" y="624" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="11"
        font-weight="700" letter-spacing="2.5" fill="#0b3d77" opacity="0.65">REGULATORY PHASE · NO PATIENT DATA PROCESSED YET</text>
</svg>
